<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="claw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4500"/>
      <stop offset="100%" style="stop-color:#cc3700"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#daa520"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="98" fill="url(#bg)" stroke="#ff4500" stroke-width="2" opacity="0.9"/>
  
  <!-- Subtle circuit pattern (tech/AI vibe) -->
  <g opacity="0.08" stroke="#6366f1" stroke-width="0.5" fill="none">
    <line x1="20" y1="40" x2="60" y2="40"/>
    <line x1="60" y1="40" x2="60" y2="60"/>
    <circle cx="60" cy="60" r="2" fill="#6366f1"/>
    <line x1="140" y1="150" x2="180" y2="150"/>
    <line x1="140" y1="150" x2="140" y2="130"/>
    <circle cx="140" cy="130" r="2" fill="#6366f1"/>
    <line x1="30" y1="160" x2="50" y2="160"/>
    <line x1="50" y1="160" x2="50" y2="140"/>
    <line x1="150" y1="50" x2="170" y2="50"/>
    <line x1="150" y1="50" x2="150" y2="70"/>
  </g>
  
  <!-- Main Lobster Claw — stylized, bold -->
  <g filter="url(#glow)">
    <!-- Left pincer -->
    <path d="M 55 75 Q 35 55, 42 35 Q 48 20, 62 28 Q 72 34, 68 50 Q 65 62, 72 72" 
          fill="url(#claw)" stroke="#ff6030" stroke-width="1.5"/>
    <!-- Right pincer -->
    <path d="M 95 75 Q 115 55, 108 35 Q 102 20, 88 28 Q 78 34, 82 50 Q 85 62, 78 72" 
          fill="url(#claw)" stroke="#ff6030" stroke-width="1.5"/>
    <!-- Claw base / body -->
    <path d="M 55 75 Q 60 85, 75 88 Q 90 85, 95 75 Q 90 68, 75 65 Q 60 68, 55 75" 
          fill="url(#claw)" stroke="#ff6030" stroke-width="1"/>
  </g>
  
  <!-- Gold chain (Jay-Z nod) draped below claw -->
  <g filter="url(#goldGlow)">
    <!-- Chain links -->
    <path d="M 45 95 Q 55 88, 65 92 Q 75 96, 85 92 Q 95 88, 105 92 Q 115 96, 125 92 Q 135 88, 145 95" 
          fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 50 100 Q 60 94, 70 98 Q 80 102, 90 98 Q 100 94, 110 98 Q 120 102, 130 98 Q 140 94, 148 100" 
          fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Medallion — "JC" -->
    <circle cx="100" cy="125" r="18" fill="#1a1a2e" stroke="url(#gold)" stroke-width="2.5"/>
    <circle cx="100" cy="125" r="14" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.5"/>
    <!-- Chain to medallion -->
    <line x1="90" y1="100" x2="88" y2="110" stroke="url(#gold)" stroke-width="2"/>
    <line x1="110" y1="100" x2="112" y2="110" stroke="url(#gold)" stroke-width="2"/>
    <path d="M 88 110 Q 100 105, 112 110" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <line x1="94" y1="107" x2="94" y2="112" stroke="url(#gold)" stroke-width="1.5"/>
    <line x1="106" y1="107" x2="106" y2="112" stroke="url(#gold)" stroke-width="1.5"/>
    <!-- JC text -->
    <text x="100" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" font-style="italic" fill="url(#gold)">JC</text>
  </g>
  
  <!-- Tiny crown above claw (Jay-Z empire state of mind) -->
  <g transform="translate(75, 12)" fill="url(#gold)" filter="url(#goldGlow)">
    <polygon points="0,18 4,8 8,14 12,4 16,14 20,8 24,18" stroke="#daa520" stroke-width="0.5"/>
    <rect x="0" y="18" width="24" height="4" rx="1"/>
    <!-- Crown jewels -->
    <circle cx="4" cy="10" r="1.5" fill="#ff4500"/>
    <circle cx="12" cy="6" r="1.5" fill="#6366f1"/>
    <circle cx="20" cy="10" r="1.5" fill="#ff4500"/>
  </g>
  
  <!-- Subtle AI eye in the claw opening -->
  <ellipse cx="75" cy="58" rx="6" ry="4" fill="#6366f1" opacity="0.8" filter="url(#glow)"/>
  <ellipse cx="75" cy="58" rx="2.5" ry="2.5" fill="#c7d2fe"/>
  <ellipse cx="75" cy="58" rx="1" ry="1" fill="#1a1a2e"/>
  
  <!-- Name arc at bottom -->
  <defs>
    <path id="textArc" d="M 40 165 Q 100 190, 160 165"/>
  </defs>
  <text font-family="-apple-system, 'SF Pro Display', sans-serif" font-size="14" font-weight="600" fill="#8892a4" letter-spacing="3">
    <textPath href="#textArc" startOffset="50%" text-anchor="middle">JAY-C</textPath>
  </text>
  
</svg>
